name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Read release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="$(node --print "require('./package.json').version")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid package version: $version" >&2
            exit 1
          fi

          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.version.outputs.exists != 'true'
        run: npm ci --ignore-scripts

      - name: Verify release candidate
        if: steps.version.outputs.exists != 'true'
        run: npm run verify

      - name: Create GitHub release
        id: create
        if: steps.version.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          release_args=("$TAG" --title "Strategos $TAG" --generate-notes)
          if [[ "$VERSION" == *-* ]]; then
            release_args+=(--prerelease)
          else
            release_args+=(--latest)
          fi

          if git show-ref --verify --quiet "refs/tags/$TAG"; then
            gh release create "${release_args[@]}" --verify-tag
          else
            gh release create "${release_args[@]}" --target "$GITHUB_SHA"
          fi

      - name: Write release summary
        if: always()
        env:
          TAG: ${{ steps.version.outputs.tag }}
          EXISTS: ${{ steps.version.outputs.exists }}
          VERSION_OUTCOME: ${{ steps.version.outcome }}
          CREATE_OUTCOME: ${{ steps.create.outcome }}
        shell: bash
        run: |
          if [[ "$VERSION_OUTCOME" != "success" ]]; then
            echo "### Release failed before a valid version was read." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$EXISTS" == "true" ]]; then
            echo "### $TAG already exists; release creation skipped." >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$CREATE_OUTCOME" == "success" ]]; then
            echo "### Published $TAG" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Failed to publish $TAG" >> "$GITHUB_STEP_SUMMARY"
          fi
